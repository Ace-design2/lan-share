<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAN Share</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>LAN Share</h1>
    <div class="status-badge" id="status-container">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Not Connected</span>
    </div>
  </div>

  <div class="device-section">
    <select class="device-select" id="devices">
      <option value="">Searching for devices...</option>
    </select>
  </div>

  
  <div class="input-container">
    <textarea id="text" placeholder="Type or paste content to share..."></textarea>
    <div class="file-action-container">
      <input type="file" id="fileInput" style="display: none;">
      <button id="fileButton" class="btn-secondary" style="margin-top: 8px; width: auto; font-size: 0.8rem; padding: 6px 12px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-paperclip"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        Attach File
      </button>
      <span id="fileName" style="font-size: 0.75rem; color: var(--text-secondary); margin-left: 8px;"></span>
    </div>
  </div>
  
  <div class="button-group">
    <button id="send" class="btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      Send
    </button>
    <button id="paste" class="btn-secondary">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clipboard"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
      Paste from Clipboard
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
